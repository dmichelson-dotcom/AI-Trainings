<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --oreilly: #D6001C;        /* O'Reilly red — used as the secondary accent */
    --pearson: #E91D24;        /* Pearson red */
    --oreilly-blue: #0066CC;   /* O'Reilly blue per request */
    --ink: #0A0E27;
    --ink-soft: #4A5168;
    --ink-faint: #8A92A8;
    --paper: #FAFAF7;
    --paper-soft: #F2F0E8;
    --rule: #1A1A1A;
    --rule-soft: #DDD8C8;
    --highlight: #FEF3C7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    font-size: 15px;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at top right, rgba(0,102,204,0.04), transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(214,0,28,0.03), transparent 50%);
  }

  /* ===== Masthead ===== */
  .masthead {
    border-bottom: 3px double var(--rule);
    padding: 32px 48px 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: end;
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(8px);
    background: rgba(250, 250, 247, 0.92);
  }

  .masthead-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .masthead-meta span::before {
    content: "◆ ";
    color: var(--oreilly-blue);
    font-size: 8px;
    margin-right: 4px;
  }

  .masthead-title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: clamp(28px, 4.2vw, 44px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .masthead-title em {
    font-style: italic;
    font-weight: 400;
    color: var(--oreilly-blue);
  }

  .masthead-subtitle {
    margin-top: 8px;
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 60ch;
  }

  .legend {
    display: flex;
    gap: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .legend-swatch.oreilly { background: var(--oreilly-blue); }
  .legend-swatch.pearson { background: var(--pearson); }

  /* ===== View tabs ===== */
  .view-controls {
    padding: 18px 48px;
    border-bottom: 1px solid var(--rule-soft);
    display: flex;
    gap: 0;
    align-items: center;
    background: var(--paper-soft);
  }
  .view-controls-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-right: 18px;
  }
  .view-tab {
    background: transparent;
    border: none;
    padding: 8px 18px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.18s ease;
    letter-spacing: 0.01em;
  }
  .view-tab:hover {
    color: var(--ink);
  }
  .view-tab.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
    font-weight: 600;
  }

  /* ===== Main content ===== */
  main {
    padding: 40px 48px 80px;
    max-width: 1280px;
  }

  .view {
    display: none;
  }
  .view.active {
    display: block;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Section headers ===== */
  .section {
    margin-bottom: 44px;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding-bottom: 8px;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--rule);
  }
  .section-header h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .section-header .count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  /* ===== Training items ===== */
  ul.trainings {
    list-style: none;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 0;
    border-top: 1px solid var(--rule-soft);
  }
  .topic-list ul.trainings {
    grid-template-columns: 1fr;
    border-top: 1px solid var(--rule-soft);
  }

  li.training {
    padding: 14px 18px 14px 14px;
    border-bottom: 1px solid var(--rule-soft);
    border-left: 3px solid transparent;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: background 0.15s ease, border-left-color 0.15s ease;
    background: rgba(255,255,255,0.4);
  }
  li.training:hover {
    background: rgba(255,255,255,0.85);
  }
  li.training.oreilly { border-left-color: var(--oreilly-blue); }
  li.training.pearson { border-left-color: var(--pearson); }

  li.training.oreilly:hover { background: rgba(0,102,204,0.04); }
  li.training.pearson:hover { background: rgba(233,29,36,0.04); }

  .date-block {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    line-height: 1.2;
    color: var(--ink-soft);
    flex-shrink: 0;
    min-width: 64px;
    padding-top: 2px;
    text-align: right;
  }
  .date-block .month {
    display: block;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink);
    font-size: 10px;
  }
  .date-block .day {
    display: block;
    font-family: 'Fraunces', serif;
    font-size: 22px;
    line-height: 1;
    margin-top: 2px;
    color: var(--ink);
    font-weight: 500;
  }
  .date-block.unscheduled {
    color: var(--ink-faint);
  }
  .date-block.unscheduled .month,
  .date-block.unscheduled .day {
    color: var(--ink-faint);
    font-weight: 400;
  }
  .date-block.unscheduled .label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    line-height: 1.3;
  }

  .training-body {
    flex: 1;
    min-width: 0;
  }
  .training-title {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .training-title a {
    color: var(--ink);
    text-decoration: none;
    background-image: linear-gradient(transparent 80%, rgba(0,102,204,0.18) 80%);
    transition: background 0.2s ease, color 0.2s ease;
  }
  li.pearson .training-title a {
    background-image: linear-gradient(transparent 80%, rgba(233,29,36,0.16) 80%);
  }
  .training-title a:hover {
    color: var(--oreilly-blue);
    background-image: linear-gradient(transparent 0%, rgba(0,102,204,0.12) 100%);
  }
  li.pearson .training-title a:hover {
    color: var(--pearson);
    background-image: linear-gradient(transparent 0%, rgba(233,29,36,0.10) 100%);
  }
  .training-title.no-link {
    color: var(--ink-soft);
  }
  .training-title.no-link::after {
    content: " — no link available";
    font-size: 11px;
    font-style: italic;
    color: var(--ink-faint);
    font-weight: 400;
  }

  .training-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-faint);
  }
  .pub-tag {
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 9px;
  }
  .pub-tag.oreilly {
    color: var(--oreilly-blue);
    background: rgba(0,102,204,0.1);
  }
  .pub-tag.pearson {
    color: var(--pearson);
    background: rgba(233,29,36,0.1);
  }

  .training-tools {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .tool-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border: 1px solid var(--rule-soft);
    background: rgba(255,255,255,0.7);
    color: var(--ink-soft);
    border-radius: 999px;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  li.training:hover .tool-chip {
    border-color: var(--ink-faint);
    color: var(--ink);
  }
  .tool-chip.tool-agnostic {
    background: transparent;
    color: var(--ink-faint);
    border-style: dashed;
    font-style: italic;
  }

  .view-note {
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
    margin-bottom: 24px;
    padding: 10px 14px;
    background: rgba(0,102,204,0.04);
    border-left: 3px solid var(--oreilly-blue);
    max-width: 80ch;
  }

  /* ===== Date view: month grouping ===== */
  .month-group {
    margin-bottom: 36px;
  }
  .month-header {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 12px;
  }
  .month-header .year {
    color: var(--ink-faint);
    font-weight: 400;
  }

  /* ===== Footer ===== */
  footer {
    padding: 32px 48px;
    border-top: 3px double var(--rule);
    margin-top: 40px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    background: var(--paper-soft);
  }
  footer .row {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  /* ===== Responsive ===== */
  @media (max-width: 720px) {
    .masthead { padding: 20px 20px 16px; grid-template-columns: 1fr; }
    .legend { font-size: 10px; }
    .view-controls { padding: 12px 20px; flex-wrap: wrap; gap: 4px 0; }
    .view-tab { padding: 6px 12px; font-size: 12px; }
    main { padding: 24px 20px 60px; }
    ul.trainings { grid-template-columns: 1fr; }
    .date-block { min-width: 54px; }
    footer { padding: 24px 20px; }
  }

  /* Print-friendly */
  @media print {
    .view-controls, .masthead-meta, .legend { display: none; }
    .view { display: block !important; page-break-after: always; }
    body { background: white; }
  }
</style>
</head>

  { title: "AI Agent Essentials for Success at Work", url: "https://learning.oreilly.com/live-events/ai-agent-essentials-for-success-at-work/0642572293406/0642572357894/", date: "2026-06-09", dateLabel: "June 9", publisher: "pearson", topic: "AI Agents", tools: [] },
  { title: "Excel Pivot Tables Made Easy with AI", url: "https://learning.oreilly.com/live-events/excel-pivot-tables-made-easy-with-ai/0642572255831/0642572367404/", date: "2026-06-18", dateLabel: "June 18", publisher: "pearson", topic: "Excel & Data", tools: ["Excel"] },
  { title: "AI Tools for Managers and Coaches", url: "https://learning.oreilly.com/live-events/ai-tools-for-managers-and-coaches/0642572013855/0642572359720/", date: "2026-06-18", dateLabel: "June 18", publisher: "pearson", topic: "Strategy & Leadership", tools: [] },
];

// Tool display order — most catalog presence first, then alpha
const TOOL_ORDER = [
  "Microsoft Copilot",
  "Claude",
  "ChatGPT",
  "Excel",
  "Zapier",
  "Gemini",
  "Perplexity",
  "n8n",
];

// Topic display order (curated, not alphabetical, to put "broad foundations" first)
const TOPIC_ORDER = [
  "Foundations",
  "Productivity",
  "AI Agents",
  "Claude",
  "Microsoft Copilot",
  "Google Workspace",
  "Excel & Data",
  "Writing & Communication",
  "Project & Product",
  "Strategy & Leadership",
  "Learning & Coaching",
  "Career & Personal",
  "Automation",
  "Building and Customizing",
];

const PUBLISHER_LABELS = {
  oreilly: "O'Reilly Media",
  pearson: "Pearson",
};

// ============================================================
// HELPERS
// ============================================================
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTHS_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function dateBlock(t) {
  if (!t.date) {
    return `<div class="date-block unscheduled">
      <span class="label">${t.dateLabel}</span>
    </div>`;
  }
  const d = new Date(t.date + "T00:00:00");
  return `<div class="date-block">
    <span class="month">${MONTHS_SHORT[d.getMonth()]}</span>
    <span class="day">${d.getDate()}</span>
  </div>`;
}

function trainingItem(t) {
  const titleHtml = t.url
    ? `<a href="${t.url}" target="_blank" rel="noopener">${t.title}</a>`
    : `<span class="no-link-text">${t.title}</span>`;
  const titleClass = t.url ? "training-title" : "training-title no-link";
  const toolChips = t.tools.length
    ? t.tools.map(tool => `<span class="tool-chip">${tool}</span>`).join("")
    : `<span class="tool-chip tool-agnostic">Tool-agnostic</span>`;
  return `
    <li class="training ${t.publisher}">
      ${dateBlock(t)}
      <div class="training-body">
        <div class="${titleClass}">${titleHtml}</div>
        <div class="training-meta">
          <span class="pub-tag ${t.publisher}">${PUBLISHER_LABELS[t.publisher]}</span>
          <span>${t.dateLabel}</span>
          <span>· ${t.topic}</span>
        </div>
        <div class="training-tools">${toolChips}</div>
      </div>
    </li>`;
}

function sectionBlock(title, items, count) {
  return `
    <section class="section">
      <div class="section-header">
        <h2>${title}</h2>
        <span class="count">${count} ${count === 1 ? "training" : "trainings"}</span>
      </div>
      <ul class="trainings">
        ${items.map(trainingItem).join("")}
      </ul>
    </section>`;
}

// ============================================================
// VIEWS
// ============================================================
function viewByTopic() {
  const grouped = {};
  trainings.forEach(t => {
    grouped[t.topic] = grouped[t.topic] || [];
    grouped[t.topic].push(t);
  });
  // Sort each topic's items by date (scheduled first, then unscheduled), then alpha
  Object.values(grouped).forEach(list => {
    list.sort((a, b) => {
      if (a.date && !b.date) return -1;
      if (!a.date && b.date) return 1;
      if (a.date && b.date) return a.date.localeCompare(b.date);
      return a.title.localeCompare(b.title);
    });
  });
  const orderedTopics = TOPIC_ORDER.filter(t => grouped[t]);
  return `<div class="topic-list">${orderedTopics.map(topic =>
    sectionBlock(topic, grouped[topic], grouped[topic].length)
  ).join("")}</div>`;
}

function viewByDate() {
  // Group by month-year for scheduled, separate group for unscheduled
  const scheduled = trainings.filter(t => t.date).sort((a, b) => a.date.localeCompare(b.date));
  const unscheduled = trainings.filter(t => !t.date).sort((a, b) => a.title.localeCompare(b.title));

  const months = {};
  scheduled.forEach(t => {
    const d = new Date(t.date + "T00:00:00");
    const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,"0")}`;
    const label = `${MONTHS_FULL[d.getMonth()]} <span class="year">${d.getFullYear()}</span>`;
    months[key] = months[key] || { label, items: [] };
    months[key].items.push(t);
  });

  let html = "";
  Object.keys(months).sort().forEach(k => {
    html += `
      <div class="month-group">
        <div class="month-header">${months[k].label}</div>
        <ul class="trainings">${months[k].items.map(trainingItem).join("")}</ul>
      </div>`;
  });
  if (unscheduled.length) {
    html += sectionBlock("Not currently scheduled / Date TBD", unscheduled, unscheduled.length);
  }
  return html;
}

function viewByTools() {
  // Build inverted index: tool -> [trainings]
  const grouped = {};
  TOOL_ORDER.forEach(tool => grouped[tool] = []);
  trainings.forEach(t => {
    if (t.tools.length === 0) return;
    t.tools.forEach(tool => {
      if (!grouped[tool]) grouped[tool] = [];
      grouped[tool].push(t);
    });
  });
  // Sort each tool's items by date
  Object.values(grouped).forEach(list => {
    list.sort((a, b) => {
      if (a.date && !b.date) return -1;
      if (!a.date && b.date) return 1;
      if (a.date && b.date) return a.date.localeCompare(b.date);
      return a.title.localeCompare(b.title);
    });
  });

  const orderedTools = TOOL_ORDER.filter(t => grouped[t] && grouped[t].length);
  let html = `<p class="view-note">Trainings appear under every tool they cover. Tool-agnostic trainings (those that teach concepts rather than a specific product) are grouped at the bottom.</p>`;
  html += orderedTools.map(tool =>
    sectionBlock(tool, grouped[tool], grouped[tool].length)
  ).join("");

  // Tool-agnostic group
  const toolAgnostic = trainings.filter(t => t.tools.length === 0)
    .sort((a, b) => {
      if (a.date && !b.date) return -1;
      if (!a.date && b.date) return 1;
      if (a.date && b.date) return a.date.localeCompare(b.date);
      return a.title.localeCompare(b.title);
    });
  if (toolAgnostic.length) {
    html += sectionBlock("Tool-agnostic / not tied to a specific product", toolAgnostic, toolAgnostic.length);
  }
  return html;
}

function viewByPublisher() {
  const oreilly = trainings.filter(t => t.publisher === "oreilly")
    .sort((a, b) => {
      if (a.date && !b.date) return -1;
      if (!a.date && b.date) return 1;
      if (a.date && b.date) return a.date.localeCompare(b.date);
      return a.title.localeCompare(b.title);
    });
  const pearson = trainings.filter(t => t.publisher === "pearson")
    .sort((a, b) => {
      if (a.date && !b.date) return -1;
      if (!a.date && b.date) return 1;
      if (a.date && b.date) return a.date.localeCompare(b.date);
      return a.title.localeCompare(b.title);
    });
  return sectionBlock("O'Reilly Media", oreilly, oreilly.length)
       + sectionBlock("Pearson", pearson, pearson.length);
}

// ============================================================
// RENDERING / TAB HANDLING
// ============================================================
const main = document.getElementById("main-content");
const views = {
  topic: viewByTopic,
  date: viewByDate,
  tools: viewByTools,
  publisher: viewByPublisher,
};

function render(viewName) {
  main.innerHTML = `<div class="view active">${views[viewName]()}</div>`;
}

document.querySelectorAll(".view-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".view-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    render(tab.dataset.view);
  });
});

// Initial render
render("topic");
</script>

</body>
</html>
